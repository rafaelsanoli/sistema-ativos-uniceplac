services:
  mongo:
    image: mongo:7
    container_name: uniceplac-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uniceplac-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/uniceplac-assets
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: altere-este-segredo-no-ambiente
      JWT_EXPIRES_IN: 8h
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 120
      ADMIN_EMAIL: admin@uniceplac.local
      ADMIN_PASSWORD: admin12345
    ports:
      - "3001:3001"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uniceplac-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
